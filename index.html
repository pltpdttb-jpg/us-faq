        ];

        function App() {
            const [employees, setEmployees] = useState(INITIAL_EMPLOYEES);
            
            const [step, setStep] = useState('login'); 
            const [loginId, setLoginId] = useState('');
            const [loginError, setLoginError] = useState('');
            
            const [tempUser, setTempUser] = useState(null); 
            const [user, setUser] = useState(null); 
            
            const [regForm, setRegForm] = useState({ id: '', name: '', zone: '', email: '' });
            
            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [timer, setTimer] = useState(0);
            const [intervalId, setIntervalId] = useState(null);
            const [logs, setLogs] = useState([]);
            const [showFeedback, setShowFeedback] = useState(false);
            const [selectedOpt, setSelectedOpt] = useState(null);
            const [attemptCount, setAttemptCount] = useState(1);
            const [isSendingEmail, setIsSendingEmail] = useState(false);

            // ==========================================
            // SUPABASE API CALLS (ตารางแยกเฉพาะระบบนี้)
            // ==========================================
            const saveEmployeeToSupabase = async (employeeData) => {
                try {
                    await supabase.from('verify_employees').upsert([{
                        id: employeeData.id,
                        name: employeeData.name,
                        zone: employeeData.zone,
                        email: employeeData.email
                    }]);
                    console.log("บันทึกพนักงานใหม่ลง Supabase สำเร็จ");
                } catch (err) {
                    console.error('Supabase Error:', err);
                }
            };

            const saveResultToSupabase = async (resultData) => {
                try {
                    await supabase.from('verify_results').insert([resultData]);
                    console.log("บันทึกผลสอบลง Supabase สำเร็จ");
                } catch (err) {
                    console.error('Supabase Error:', err);
                }
            };

            const initQuestions = () => {
                const preparedQuestions = QUESTIONS_DB.map(q => {
                    if (q.type === 'ab') {
                        const isAFirst = Math.random() > 0.5;
                        return {
                            ...q,
                            displayOpts: isAFirst 
                                ? [{ label: 'A', text: q.optA, isCorrect: q.correct === 'A' }, { label: 'B', text: q.optB, isCorrect: q.correct === 'B' }]
                                : [{ label: 'A', text: q.optB, isCorrect: q.correct === 'B' }, { label: 'B', text: q.optA, isCorrect: q.correct === 'A' }]
                        };
                    }
                    return q; 
                });
                setQuestions(preparedQuestions);
            };

            useEffect(() => { initQuestions(); }, []);

            useEffect(() => {
                if (step === 'quiz' && !showFeedback) {
                    const id = setInterval(() => setTimer(t => t + 1), 1000);
                    setIntervalId(id);
                    return () => clearInterval(id);
                }
            }, [step, showFeedback]);

            // --- HANDLERS ---
            const handleLogin = (e) => {
                e.preventDefault();
                setLoginError('');
                const foundUser = employees.find(emp => emp.id === loginId.trim());
                if (foundUser) {
                    setTempUser(foundUser);
                    setStep('confirm');
                } else {
                    setStep('notfound');
                }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                const newUser = { ...regForm };
                setEmployees([...employees, newUser]);
                setTempUser(newUser);
                
                await saveEmployeeToSupabase(newUser);
                setStep('confirm');
            };

            const confirmUser = () => {
                setUser(tempUser);
                setStep('intro');
            };

            const startQuiz = () => {
                setStep('quiz');
                setTimer(0);
            };

            const handleABAnswer = (option) => {
                clearInterval(intervalId);
                setSelectedOpt(option);
                processAnswerResult(option.isCorrect);
            };

            const handleInteractiveAnswer = (ans1, ans2) => {
                clearInterval(intervalId);
                const q = questions[currentIndex];
                let isCorrect = q.options2 ? (ans1 === q.correct1 && ans2 === q.correct2) : (ans1 === q.correct1);
                processAnswerResult(isCorrect);
            };

            const processAnswerResult = (isCorrect) => {
                if (isCorrect) setScore(s => s + 1);
                setLogs([...logs, {
                    questionId: questions[currentIndex].id,
                    topic: questions[currentIndex].topic,
                    timeSpent: timer,
                    isCorrect: isCorrect,
                }]);
                setShowFeedback(true);
            };

            const nextQuestion = async () => {
                setShowFeedback(false);
                setSelectedOpt(null);
                setTimer(0);
                if (currentIndex + 1 < questions.length) {
                    setCurrentIndex(currentIndex + 1);
                } else {
                    const totalTime = logs.reduce((acc, log) => acc + log.timeSpent, 0) + timer;
                    const finalScore = score + (logs[logs.length-1]?.isCorrect ? 1 : 0);
                    
                    await saveResultToSupabase({
                        emp_id: user.id,
                        name: user.name,
                        zone: user.zone,
                        score: finalScore,
                        time_spent: totalTime,
                        attempt: attemptCount,
                        is_passed: finalScore === 25
                    });
                    
                    setStep('result');
                }
            };

            const handleRetry = () => {
                initQuestions();
                setCurrentIndex(0);
                setScore(0);
                setLogs([]);
                setAttemptCount(c => c + 1);
                setStep('quiz');
            };

            const handleIssueCertificate = () => {
                setIsSendingEmail(true);
                setTimeout(() => {
                    setIsSendingEmail(false);
                    setStep('certificate');
                }, 3000);
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m > 0 ? `${m}m ` : ''}${s}s`;
            };

            const isPassed = score === questions.length;

            // --- UI RENDERS ---
            if (step === 'login') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 font-sans">
                        <div className="bg-white max-w-md w-full rounded-2xl shadow-xl overflow-hidden border border-slate-200">
                            <div className="bg-[#0f172a] p-8 text-white text-center">
                                <Icons.ShieldCheck className="w-16 h-16 mx-auto mb-4 text-sky-400" />
                                <h2 className="text-2xl font-bold">Knowledge Verification</h2>
                                <p className="text-slate-300 text-sm mt-2">US Multi-Asset Index</p>
                            </div>
                            <form onSubmit={handleLogin} className="p-8 space-y-6">
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-2">รหัสพนักงาน (Employee ID)</label>
                                    <div className="relative">
                                        <Icons.Briefcase className="absolute left-3.5 top-3.5 w-5 h-5 text-slate-400" />
                                        <input required type="text" value={loginId} onChange={e => setLoginId(e.target.value)}
                                            className="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-sky-500 font-mono text-lg transition-all outline-none" placeholder="ระบุรหัสพนักงาน..." />
                                    </div>
                                </div>
                                <button type="submit" className="w-full bg-[#0ea5e9] hover:bg-[#0284c7] text-white font-bold py-3.5 rounded-lg shadow-md transition-colors flex items-center justify-center">
                                    เข้าสู่ระบบ <Icons.ChevronRight className="ml-2 w-5 h-5" />
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (step === 'notfound') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4">
                        <div className="bg-white max-w-md w-full rounded-2xl shadow-xl p-8 text-center border border-slate-200">
                            <Icons.XCircle className="w-16 h-16 mx-auto mb-4 text-rose-500" />
                            <h2 className="text-2xl font-bold text-slate-800 mb-2">ไม่พบข้อมูลในระบบ</h2>
                            <p className="text-slate-600 mb-8">รหัสพนักงาน {loginId} ไม่มีในฐานข้อมูล ท่านต้องการลงทะเบียนใหม่หรือไม่?</p>
                            <div className="space-y-4">
                                <button onClick={() => setStep('register')} className="w-full bg-[#0f172a] text-white font-bold py-3.5 rounded-lg shadow-md flex items-center justify-center">
                                    <Icons.PlusCircle className="mr-2 w-5 h-5"/> ลงทะเบียนพนักงานใหม่
                                </button>
                                <button onClick={() => { setStep('login'); setLoginId(''); }} className="w-full bg-slate-100 text-slate-700 font-bold py-3.5 rounded-lg hover:bg-slate-200">
                                    กลับไปกรอกรหัสใหม่
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (step === 'register') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4">
                        <div className="bg-white max-w-md w-full rounded-2xl shadow-xl overflow-hidden border border-slate-200">
                            <div className="bg-[#0f172a] p-6 text-white text-center">
                                <h2 className="text-xl font-bold">ลงทะเบียนพนักงานใหม่</h2>
                            </div>
                            <form onSubmit={handleRegister} className="p-8 space-y-4">
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-1">รหัสพนักงาน</label>
                                    <input required type="text" value={regForm.id} onChange={e => setRegForm({...regForm, id: e.target.value})} className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-sky-500" />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-1">ชื่อ-นามสกุล (พร้อมชื่อเล่น)</label>
                                    <input required type="text" value={regForm.name} onChange={e => setRegForm({...regForm, name: e.target.value})} className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-sky-500" />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-1">สาขา / สังกัด (Zone)</label>
                                    <input required type="text" value={regForm.zone} onChange={e => setRegForm({...regForm, zone: e.target.value})} className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-sky-500" />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-1">อีเมลบริษัท</label>
                                    <input required type="email" value={regForm.email} onChange={e => setRegForm({...regForm, email: e.target.value})} className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-sky-500" />
                                </div>
                                <button type="submit" className="w-full bg-[#0ea5e9] text-white font-bold py-3.5 rounded-lg mt-4 shadow-md">บันทึกลง Supabase และเข้าสู่ระบบ</button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (step === 'confirm') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4">
                        <div className="bg-white max-w-md w-full rounded-2xl shadow-xl p-8 text-center border border-slate-200">
                            <div className="w-20 h-20 bg-sky-100 text-sky-600 rounded-full flex items-center justify-center mx-auto mb-6">
                                <Icons.User className="w-10 h-10" />
                            </div>
                            <h2 className="text-2xl font-bold text-slate-800 mb-1">ยืนยันตัวตน</h2>
                            
                            <div className="bg-slate-50 rounded-xl p-4 text-left border border-slate-200 mb-8 mt-4">
                                <div className="mb-2"><span className="text-slate-400 text-sm">รหัสพนักงาน:</span> <span className="font-bold text-slate-800 float-right">{tempUser.id}</span></div>
                                <div className="mb-2"><span className="text-slate-400 text-sm">ชื่อ-นามสกุล:</span> <span className="font-bold text-slate-800 float-right">{tempUser.name}</span></div>
                                <div className="mb-2"><span className="text-slate-400 text-sm">สังกัด/โซน:</span> <span className="font-bold text-slate-800 float-right">{tempUser.zone}</span></div>
                            </div>

                            <button onClick={confirmUser} className="w-full bg-[#0f172a] text-white font-bold py-3.5 rounded-lg shadow-md mb-3 flex justify-center items-center">
                                <Icons.CheckCircle className="mr-2 w-5 h-5"/> ยืนยัน (Confirm)
                            </button>
                        </div>
                    </div>
                );
            }

            if (step === 'intro') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white max-w-3xl w-full rounded-2xl shadow-xl p-8 md:p-12 border border-slate-200">
                            <h2 className="text-3xl font-extrabold text-[#0f172a] mb-6 border-b pb-4 flex items-center">
                                <Icons.FileText className="mr-3 text-sky-500 w-8 h-8"/> กติกาการทดสอบ
                            </h2>
                            <div className="space-y-5 text-slate-600 text-lg mb-8">
                                <p className="flex items-start"><Icons.Check className="w-6 h-6 text-sky-500 mr-3 shrink-0 mt-0.5" /> <span>ครอบคลุมเนื้อหา FAQ ทั้งหมด <strong>25 ข้อ</strong></span></p>
                                <p className="flex items-start"><Icons.Check className="w-6 h-6 text-sky-500 mr-3 shrink-0 mt-0.5" /> <span>ข้อมูลในแบบทดสอบคัดลอกมาจากเอกสาร <strong>Word-by-Word 100%</strong></span></p>
                                <p className="flex items-start bg-rose-50 p-5 rounded-xl border border-rose-200 text-rose-800 font-semibold shadow-sm">
                                    <Icons.AlertTriangle className="w-6 h-6 text-rose-500 mr-3 shrink-0 mt-0.5" /> 
                                    <span>เกณฑ์การผ่านคือ 100% (25/25) เท่านั้น หากผิดแม้แต่ข้อเดียว ต้องกลับมาเริ่มทำใหม่ทั้งหมด</span>
                                </p>
                            </div>
                            <button onClick={startQuiz} className="w-full bg-[#0f172a] hover:bg-[#1e293b] text-white text-xl font-bold py-5 rounded-xl shadow-lg transition-transform hover:scale-105">
                                เริ่มทำแบบทดสอบ (ครั้งที่ {attemptCount})
                            </button>
                        </div>
                    </div>
                );
            }

            if (step === 'quiz') {
                const currentQ = questions[currentIndex];
                const progress = ((currentIndex) / questions.length) * 100;

                const InteractiveQuestion = () => {
                    const [sel1, setSel1] = useState('');
                    const [sel2, setSel2] = useState('');

                    const renderTextWithDropdowns = () => {
                        let parts = currentQ.text.split('{DROP1}');
                        let content = [];
                        content.push(<span key="1">{parts[0]}</span>);
                        content.push(
                            <select key="d1" value={sel1} onChange={e => setSel1(e.target.value)} disabled={showFeedback} className="mx-2 p-2 border border-sky-400 rounded bg-sky-50 font-semibold text-sky-800 outline-none">
                                <option value="">-- เลือกคำตอบ --</option>
                                {currentQ.options1.map((o, i) => <option key={i} value={o}>{o}</option>)}
                            </select>
                        );
                        if (currentQ.options2) {
                            let parts2 = parts[1].split('{DROP2}');
                            content.push(<span key="2">{parts2[0]}</span>);
                            content.push(
                                <select key="d2" value={sel2} onChange={e => setSel2(e.target.value)} disabled={showFeedback} className="mx-2 p-2 border border-sky-400 rounded bg-sky-50 font-semibold text-sky-800 outline-none">
                                    <option value="">-- เลือกคำตอบ --</option>
                                    {currentQ.options2.map((o, i) => <option key={i} value={o}>{o}</option>)}
                                </select>
                            );
                            content.push(<span key="3">{parts2[1]}</span>);
                        } else {
                            content.push(<span key="2">{parts[1]}</span>);
                        }
                        return content;
                    };

                    const isReady = currentQ.options2 ? (sel1 && sel2) : sel1;

                    return (
                        <div className="p-8 bg-white text-xl leading-relaxed text-slate-700">
                            <p className="mb-8">{renderTextWithDropdowns()}</p>
                            {!showFeedback && (
                                <button 
                                    disabled={!isReady}
                                    onClick={() => handleInteractiveAnswer(sel1, sel2)} 
                                    className={`px-8 py-3 rounded-lg font-bold text-white transition-all ${isReady ? 'bg-sky-600 hover:bg-sky-700 shadow-md' : 'bg-slate-300 cursor-not-allowed'}`}>
                                    ยืนยันคำตอบ
                                </button>
                            )}
                        </div>
                    );
                };

                return (
                    <div className="min-h-screen bg-slate-50 p-4 md:p-8 flex flex-col items-center">
                        <div className="max-w-4xl w-full mb-6 mt-4">
                            <div className="flex justify-between items-end mb-2">
                                <div className="text-xl font-bold text-slate-800">ข้อที่ {currentIndex + 1} <span className="text-slate-400 text-base font-medium">/ {questions.length}</span></div>
                                <div className="flex items-center text-slate-600 bg-white px-4 py-1.5 rounded-lg shadow-sm font-mono border border-slate-200">
                                    <Icons.Clock className="w-4 h-4 mr-2 text-sky-500" /> {formatTime(timer)}
                                </div>
                            </div>
                            <div className="w-full bg-slate-200 rounded-full h-2">
                                <div className="bg-[#0ea5e9] h-2 rounded-full transition-all duration-300" style={{ width: `${progress}%` }}></div>
                            </div>
                        </div>

                        <div className="max-w-4xl w-full bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-6">
                            <div className="bg-[#0f172a] p-6 md:p-8">
                                <h3 className="text-2xl font-bold text-white leading-tight">{currentQ.topic}</h3>
                            </div>
                            
                            {currentQ.type === 'ab' ? (
                                <div className="p-6 md:p-8 grid md:grid-cols-2 gap-6 bg-slate-50 relative">
                                    {currentQ.displayOpts.map((opt, idx) => {
                                        const isSelected = selectedOpt === opt;
                                        let cardClass = "p-6 rounded-xl border-2 cursor-pointer transition-all flex items-start flex-col ";
                                        if (!showFeedback) {
                                            cardClass += "border-slate-200 bg-white hover:border-sky-400 hover:shadow-md";
                                        } else {
                                            cardClass += "cursor-default ";
                                            if (opt.isCorrect) cardClass += isSelected ? "border-emerald-500 bg-emerald-50" : "border-emerald-400 bg-white";
                                            else cardClass += isSelected ? "border-rose-500 bg-rose-50" : "border-slate-200 opacity-40 bg-white";
                                        }

                                        return (
                                            <div key={idx} onClick={() => !showFeedback && handleABAnswer(opt)} className={cardClass}>
                                                <div className={`shrink-0 px-3 py-1 rounded text-sm font-bold mb-3 transition-colors ${showFeedback && opt.isCorrect ? 'bg-emerald-500 text-white' : showFeedback && isSelected && !opt.isCorrect ? 'bg-rose-500 text-white' : 'bg-slate-200 text-slate-600'}`}>
                                                    ตัวเลือก {idx === 0 ? 'A' : 'B'}
                                                </div>
                                                <div className={`text-lg leading-relaxed ${showFeedback && isSelected && !opt.isCorrect ? 'text-rose-900' : 'text-slate-700'}`}>
                                                    {opt.text}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            ) : (
                                <InteractiveQuestion />
                            )}
                        </div>

                        {showFeedback && (
                            <div className={`max-w-4xl w-full rounded-2xl p-6 md:p-8 border-l-8 shadow-md flex flex-col md:flex-row items-center justify-between animate-fade-in-up
                                ${logs[logs.length-1].isCorrect ? 'bg-emerald-50 border-emerald-500' : 'bg-rose-50 border-rose-500'}`}>
                                <div className="flex-1 mb-6 md:mb-0 md:mr-8">
                                    <h4 className={`text-xl font-bold flex items-center mb-2 ${logs[logs.length-1].isCorrect ? 'text-emerald-700' : 'text-rose-700'}`}>
                                        {logs[logs.length-1].isCorrect ? <Icons.CheckCircle className="w-6 h-6 mr-2" /> : <Icons.AlertTriangle className="w-6 h-6 mr-2" />}
                                        {logs[logs.length-1].isCorrect ? 'ถูกต้อง!' : 'ผิดพลาด!'}
                                    </h4>
                                    <p className="text-slate-700 text-lg"><strong>คำอธิบาย/ข้อเท็จจริง:</strong> {currentQ.explanation}</p>
                                </div>
                                <button onClick={nextQuestion} className={`shrink-0 px-8 py-4 rounded-xl font-bold text-white shadow-md flex items-center transition-transform hover:scale-105
                                    ${logs[logs.length-1].isCorrect ? 'bg-emerald-600' : 'bg-[#0f172a]'}`}>
                                    {currentIndex + 1 === questions.length ? 'ดูผลสรุปและส่งบันทึก Supabase' : 'ไปข้อถัดไป'} <Icons.ChevronRight className="ml-2 w-5 h-5" />
                                </button>
                            </div>
                        )}
                    </div>
                );
            }

            if (step === 'result') {
                const totalTime = logs.reduce((acc, log) => acc + log.timeSpent, 0);

                return (
                    <div className="min-h-screen flex flex-col items-center p-4 md:p-8">
                        {isSendingEmail ? (
                            <div className="flex flex-col items-center justify-center h-[70vh]">
                                <div className="w-20 h-20 border-4 border-slate-200 border-t-sky-500 rounded-full animate-spin mb-6"></div>
                                <h2 className="text-3xl font-bold text-slate-800">กำลังประมวลผลข้อมูลลง Supabase...</h2>
                            </div>
                        ) : (
                            <div className="max-w-4xl w-full space-y-6">
                                <div className="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
                                    <div className={`p-12 text-center text-white ${isPassed ? 'bg-emerald-600' : 'bg-rose-600'}`}>
                                        {isPassed ? <Icons.Award className="w-24 h-24 mx-auto mb-6 text-emerald-200" /> : <Icons.XCircle className="w-24 h-24 mx-auto mb-6 text-rose-200" />}
                                        <h1 className="text-4xl md:text-5xl font-black mb-3">{isPassed ? 'ยินดีด้วย! ท่านผ่านการประเมิน' : 'ไม่ผ่านเกณฑ์การประเมิน (100%)'}</h1>
                                    </div>
                                    
                                    <div className="p-8 md:p-12 text-center">
                                        <div className="grid grid-cols-3 gap-4 mb-10">
                                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                <div className="text-slate-500 text-sm font-bold uppercase mb-1">คะแนนรวม</div>
                                                <div className="text-3xl font-black text-slate-800">{score}/{questions.length}</div>
                                            </div>
                                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                <div className="text-slate-500 text-sm font-bold uppercase mb-1">เวลาค้นคว้า</div>
                                                <div className="text-3xl font-black text-slate-800">{formatTime(totalTime)}</div>
                                            </div>
                                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                <div className="text-slate-500 text-sm font-bold uppercase mb-1">จำนวนครั้งที่สอบ</div>
                                                <div className="text-3xl font-black text-slate-800">{attemptCount}</div>
                                            </div>
                                        </div>

                                        {!isPassed && (
                                            <div className="bg-rose-50 border border-rose-200 p-8 rounded-2xl mb-8 text-left shadow-sm">
                                                <h3 className="font-bold text-rose-800 mb-4 text-xl flex items-center"><Icons.AlertTriangle className="w-6 h-6 mr-2"/> ข้อที่ท่านพลาดไป (โปรดทบทวนก่อนทำใหม่)</h3>
                                                <ul className="space-y-4">
                                                    {logs.filter(l => !l.isCorrect).map((log, i) => {
                                                        const q = questions.find(q => q.id === log.questionId);
                                                        return (
                                                            <li key={i} className="text-slate-700 text-base flex items-start bg-white p-4 rounded-lg border border-rose-100">
                                                                <Icons.XCircle className="w-5 h-5 text-rose-500 mr-3 shrink-0 mt-0.5" />
                                                                <div>
                                                                    <strong className="block text-slate-900 mb-1">{q.topic}</strong>
                                                                    <span className="text-rose-700 bg-rose-100 px-2 py-0.5 rounded text-sm mr-2">เฉลย</span> {q.explanation}
                                                                </div>
                                                            </li>
                                                        );
                                                    })}
                                                </ul>
                                            </div>
                                        )}

                                        {isPassed ? (
                                            <button onClick={handleIssueCertificate} className="w-full bg-[#0f172a] hover:bg-[#1e293b] text-white text-xl font-bold py-5 rounded-xl shadow-xl transition-transform hover:scale-[1.02] flex justify-center items-center">
                                                <Icons.Mail className="w-7 h-7 mr-3" /> ออกใบประกาศนียบัตร
                                            </button>
                                        ) : (
                                            <button onClick={handleRetry} className="w-full bg-[#0ea5e9] hover:bg-[#0284c7] text-white text-xl font-bold py-5 rounded-xl shadow-xl transition-transform hover:scale-[1.02] flex justify-center items-center">
                                                <Icons.RotateCcw className="w-7 h-7 mr-3" /> เริ่มทำแบบทดสอบใหม่อีกครั้ง
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            if (step === 'certificate') {
                return (
                    <div className="min-h-screen bg-slate-200 p-4 md:p-8 flex flex-col items-center justify-center font-sans">
                        <div className="max-w-4xl w-full bg-white p-3 shadow-2xl animate-fade-in-up print:shadow-none print:p-0">
                            <div className="border-[14px] border-[#0f172a] p-3 h-full">
                                <div className="border-4 border-[#0ea5e9] p-12 md:p-16 text-center h-full relative overflow-hidden bg-white">
                                    <Icons.ShieldCheck className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[30rem] h-[30rem] text-slate-50 opacity-60" />
                                    <div className="relative z-10">
                                        <h1 className="text-5xl md:text-6xl font-black text-[#0f172a] uppercase tracking-widest mb-4 font-serif">Certificate</h1>
                                        <h2 className="text-2xl text-sky-600 font-bold tracking-[0.3em] uppercase mb-16">of Achievement</h2>
                                        <p className="text-slate-500 italic text-xl mb-6">This is to certify that</p>
                                        <div className="text-5xl font-bold text-slate-800 border-b-2 border-slate-300 inline-block pb-4 px-16 mb-10">
                                            {user.name}
                                        </div>
                                        <p className="text-slate-600 text-xl max-w-2xl mx-auto leading-relaxed mb-20">
                                            Has successfully completed the Knowledge Verification Test for the <br/>
                                            <strong className="text-2xl block mt-2 text-[#0f172a]">US Multi-Asset Index Principal Protection</strong><br/>
                                            achieving a perfect score of 100% on Attempt #{attemptCount}.
                                        </p>
                                        <div className="flex justify-between items-end mt-16 px-4 md:px-12">
                                            <div className="text-center">
                                                <div className="text-slate-500 font-mono text-base mb-2">ID: {user.id}</div>
                                                <div className="border-t-2 border-[#0f172a] pt-2 text-slate-800 font-bold uppercase tracking-wider text-sm w-48">Employee ID</div>
                                            </div>
                                            <div className="text-center px-4">
                                                <Icons.Award className="w-20 h-20 text-amber-500 mx-auto mb-3" />
                                                <div className="text-[#0f172a] font-black tracking-widest text-lg">PRUDENTIAL</div>
                                            </div>
                                            <div className="text-center">
                                                <div className="text-slate-800 font-bold text-lg mb-2">{user.zone}</div>
                                                <div className="border-t-2 border-[#0f172a] pt-2 text-slate-800 font-bold uppercase tracking-wider text-sm w-48">Department (Zone)</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button onClick={() => window.print()} className="mt-8 bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 px-8 py-4 rounded-xl font-bold shadow-md flex items-center transition-colors print:hidden text-lg">
                            <Icons.Download className="w-6 h-6 mr-3 text-sky-600" /> พิมพ์หรือบันทึก Certificate เป็น PDF
                        </button>
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
