            { id: 6, type: 'ab', topic: "6. ปัจจัยที่ถูกนำมาวิเคราะห์และความแม่นยำ", optA: "ในอดีต ข้อมูลของ QC มีความสัมพันธ์ (Correlation) กับ เงินเฟ้อสหรัฐฯ (CPI) ถึง 99% และ GDP สหรัฐฯ 95% และรู้ล่วงหน้าก่อนประกาศจริงประมาณ 1-2 สัปดาห์ (สำหรับ CPI)", optB: "ในอดีต ข้อมูลของ QC มีความสัมพันธ์ (Correlation) กับ เงินเฟ้อสหรัฐฯ (CPI) ถึง 95% และ GDP สหรัฐฯ 99% และรู้ล่วงหน้าก่อนประกาศจริงประมาณ 1-2 สัปดาห์ (สำหรับ CPI)", correct: "A", explanation: "CPI คือ 99% และ GDP คือ 95%" },
            { id: 7, type: 'ab', topic: "7. ผลตอบแทนในอดีต (Performance)", optA: "ให้ผลตอบแทนเฉลี่ย 9.21% ต่อปี (ข้อมูลย้อนหลัง พ.ย 2016- ม.ค. 2026) โดยมีความผันผวน 7.4% และค่า Sharpe Ratio (ผลตอบแทนต่อความเสี่ยง) 1.25 อย่างไรก็ตามผลตอบแทนเฉลี่ยย้อนหลังไม่สามารถใช้การันตีผลการดำเนินงานในอนาคตได้", optB: "ให้ผลตอบแทนเฉลี่ย 9.21% ต่อปี (ข้อมูลย้อนหลัง พ.ย 2016- ม.ค. 2026) โดยมีความผันผวน 7.4% และค่า Sharpe Ratio (ผลตอบแทนต่อความเสี่ยง) 1.25 ซึ่งผลตอบแทนเฉลี่ยย้อนหลังนี้สามารถใช้การันตีผลการดำเนินงานในอนาคตได้อย่างแน่นอน", correct: "A", explanation: "มีคำเตือน: 'อย่างไรก็ตามผลตอบแทนเฉลี่ยย้อนหลังไม่สามารถใช้การันตีผลการดำเนินงานในอนาคตได้'" },
            { id: 8, type: 'ab', topic: "8. เปรียบเทียบกับดัชนีอื่นในช่วงวิกฤต", optA: "โมเดลตรวจจับสัญญาณ \"เศรษฐกิจชะลอตัว (Slow Growth)\" ได้ล่วงหน้า 3 เดือน จึงสั่งขายหุ้นทิ้งและย้ายเงินไปถือพันธบัตรสหรัฐฯ, ทองคำ และเงินดอลลาร์", optB: "โมเดลตรวจจับสัญญาณ \"เศรษฐกิจชะลอตัว (Slow Growth)\" ได้ล่วงหน้า 3 เดือน จึงสั่งขายหุ้นทิ้งและย้ายเงินไปถือพันธบัตรสหรัฐฯ, ทองคำ และเงินเยน", correct: "A", explanation: "ย้ายเงินไปถือพันธบัตรสหรัฐฯ, ทองคำ และ 'เงินดอลลาร์'" },
            { id: 9, type: 'ab', topic: "9. สัดส่วนการลงทุน (Portfolio Weights)", optA: "Stagflation (เศรษฐกิจฝืดเคือง): GDP ชะลอตัว + เงินเฟ้อสูง -> เน้นเงินสด, สินค้าโภคภัณฑ์ (น้ำมัน, ทองแดง)", optB: "Stagflation (เศรษฐกิจฝืดเคือง): GDP ชะลอตัว + เงินเฟ้อสูง -> เน้นพันธบัตร, สินค้าโภคภัณฑ์ (น้ำมัน, ทองแดง)", correct: "A", explanation: "Stagflation เน้น 'เงินสด'" },
            { id: 10, type: 'ab', topic: "10. ความถี่ในการเปลี่ยนสภาวะเศรษฐกิจ", optA: "ระบบกำหนดว่าจะเปลี่ยน Regime ก็ต่อเมื่อสัญญาณนิ่งต่อเนื่องกัน 3 วัน ถ้าเศรษฐกิจไม่เปลี่ยน จะปรับพอร์ตกลับสู่สัดส่วนมาตรฐานเดือนละครั้ง แต่การปรับเพื่อคุมความเสี่ยง (Volatility Targeting) จะทำทุกวัน", optB: "ระบบกำหนดว่าจะเปลี่ยน Regime ก็ต่อเมื่อสัญญาณนิ่งต่อเนื่องกัน 3 วัน ถ้าเศรษฐกิจไม่เปลี่ยน จะปรับพอร์ตกลับสู่สัดส่วนมาตรฐานทุกวัน แต่การปรับเพื่อคุมความเสี่ยง (Volatility Targeting) จะทำเดือนละครั้ง", correct: "A", explanation: "สัดส่วนมาตรฐานทำเดือนละครั้ง, คุมความเสี่ยงทำทุกวัน" },

            { id: 12, type: 'ab', topic: "12. Participation Rate 260% ทำได้อย่างไร", optA: "ผู้เอาประกันภัยจะได้รับผลตอบแทนจากการปรับขึ้นของสินทรัพย์อ้างอิงในอัตรา 2.6 เท่าของผลตอบแทนดัชนีอ้างอิง ตามเงื่อนไขของผลิตภัณฑ์ การที่บริษัทสามารถเสนอ Participation Rate ในระดับสูงนี้ได้ เป็นผลจากการใช้ตราสารอนุพันธ์เพื่อบริหารจัดการภาระผูกพันกับลูกค้า โดยมีการจัดสรรโครงสร้างตราสารอนุพันธ์ให้ช่วยลดต้นทุนรวมของผลิตภัณฑ์ได้ ทำให้บริษัทสามารถออกแบบผลตอบแทนที่เหมาะสม และเพิ่ม Participation Rate ให้สูงขึ้น เพื่อสร้างมูลค่าเพิ่มให้กับผู้เอาประกันภัยได้", optB: "ผู้เอาประกันภัยจะได้รับผลตอบแทนจากการปรับขึ้นของสินทรัพย์อ้างอิงในอัตรา 2.6 เท่าของผลตอบแทนดัชนีอ้างอิง ตามเงื่อนไขของผลิตภัณฑ์ การที่บริษัทสามารถเสนอ Participation Rate ในระดับสูงนี้ได้ เป็นผลจากการนำเงินเบี้ยประกันส่วนใหญ่ไปซื้อหุ้นในดัชนีแบบทวีคูณ (Leverage) โดยมีการจัดสรรโครงสร้างให้ช่วยลดต้นทุนรวมของผลิตภัณฑ์ได้ ทำให้เพิ่มผลตอบแทนได้", correct: "A", explanation: "เป็นผลจากการใช้ 'ตราสารอนุพันธ์เพื่อบริหารจัดการภาระผูกพันกับลูกค้า'" },

            { id: 18, type: 'ab', topic: "18. บริษัทประกันจะได้กำไรอย่างไร", optA: "บริษัทจะนำเงินที่ลูกค้าจ่ายเบี้ยประกันหลังหักค่าใช้จ่ายต่างๆ ไปลงทุนเพื่อสร้างผลกำไร และมีการบริหารความเสี่ยงจากการลงทุนในดัชนี เพื่อให้แน่ใจว่าสามารถจ่ายผลประโยชน์ที่การันตีได้ตามเงื่อนไขของกรมธรรม์", optB: "บริษัทจะนำเงินที่ลูกค้าจ่ายเบี้ยประกันหลังหักค่าใช้จ่ายต่างๆ ไปลงทุนเพื่อสร้างผลกำไร และมีการบริหารความเสี่ยงจากการลงทุนในดัชนี เพื่อให้แน่ใจว่าสามารถจ่ายผลประโยชน์ที่การันตีได้ 260% ของเงินต้น", correct: "A", explanation: "จ่ายผลประโยชน์ที่การันตีได้ 'ตามเงื่อนไขของกรมธรรม์'" },

            { id: 24, type: 'ab', topic: "24. การบริหารดัชนีตลอด 15 ปี", optA: "การบริหารดัชนีนี้ มีทีมผู้เชี่ยวชาญภายในของCiti (Citi Researchers) ที่มีการติดตาม และทบทวนสัดส่วนการลงทุนอย่างสม่ำเสมอ เพื่อให้สอดคล้องกับสภาวะเศรษฐกิจที่เปลี่ยนแปลงไปในอนาคตเพื่อทำให้ผลตอบแทนเป็นไปอย่างดี รวมถึงมีกลไก volatility control เพื่อคุมความเสี่ยงอีกชั้น", optB: "การบริหารดัชนีนี้ มีทีมผู้เชี่ยวชาญภายในของQuantCube (QC Researchers) ที่มีการติดตาม และทบทวนสัดส่วนการลงทุนอย่างสม่ำเสมอ เพื่อให้สอดคล้องกับสภาวะเศรษฐกิจที่เปลี่ยนแปลงไป รวมถึงมีกลไก volatility control เพื่อคุมความเสี่ยง", correct: "A", explanation: "มีทีมผู้เชี่ยวชาญของ 'Citi (Citi Researchers)' และคุมความเสี่ยงอีกชั้น" },

        ];

        function App() {
            const [employees, setEmployees] = useState(INITIAL_EMPLOYEES);
            
            const [step, setStep] = useState('login'); 
            const [loginId, setLoginId] = useState('');
            const [loginError, setLoginError] = useState('');
            
            const [tempUser, setTempUser] = useState(null); 
            const [user, setUser] = useState(null); 
            
            const [regForm, setRegForm] = useState({ id: '', name: '', zone: '', email: '' });
            
            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [timer, setTimer] = useState(0);
            const [intervalId, setIntervalId] = useState(null);
            const [logs, setLogs] = useState([]);
            
            const [showFeedback, setShowFeedback] = useState(false);
            const [selectedOpt, setSelectedOpt] = useState(null);
            const [interactiveAns1, setInteractiveAns1] = useState(''); 
            const [interactiveAns2, setInteractiveAns2] = useState(''); 
            
            const [attemptCount, setAttemptCount] = useState(1);
            const [isSendingEmail, setIsSendingEmail] = useState(false);
            const [showRetryConfirm, setShowRetryConfirm] = useState(false);

            // ==========================================
            // SUPABASE API CALLS 
            // ==========================================
            const saveEmployeeToSupabase = async (employeeData) => {
                try {
                    await supabase.from('verify_employees').upsert([{
                        id: employeeData.id,
                        name: employeeData.name,
                        zone: employeeData.zone,
                        email: employeeData.email
                    }]);
                    console.log("บันทึกพนักงานใหม่ลง Supabase สำเร็จ");
                } catch (err) {
                    console.error('Supabase Error:', err);
                }
            };

            const saveResultToSupabase = async (resultData) => {
                try {
                    await supabase.from('verify_results').insert([resultData]);
                    console.log("บันทึกผลสอบลง Supabase สำเร็จ");
                } catch (err) {
                    console.error('Supabase Error:', err);
                }
            };

            const initQuestions = () => {
                const preparedQuestions = QUESTIONS_DB.map(q => {
                    if (q.type === 'ab') {
                        const isAFirst = Math.random() > 0.5;
                        return {
                            ...q,
                            displayOpts: isAFirst 
                                ? [{ label: 'A', text: q.optA, isCorrect: q.correct === 'A' }, { label: 'B', text: q.optB, isCorrect: q.correct === 'B' }]
                                : [{ label: 'A', text: q.optB, isCorrect: q.correct === 'B' }, { label: 'B', text: q.optA, isCorrect: q.correct === 'A' }]
                        };
                    }
                    return q; 
                });
                setQuestions(preparedQuestions);
            };

            useEffect(() => { initQuestions(); }, []);

            useEffect(() => {
                if (step === 'quiz' && !showFeedback) {
                    const id = setInterval(() => setTimer(t => t + 1), 1000);
                    setIntervalId(id);
                    return () => clearInterval(id);
                }
            }, [step, showFeedback]);

            const handleLogin = (e) => {
                e.preventDefault();
                setLoginError('');
                const foundUser = employees.find(emp => emp.id === loginId.trim());
                if (foundUser) {
                    setTempUser(foundUser);
                    setStep('confirm');
                } else {
                    setStep('notfound');
                }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                const newUser = { ...regForm };
                setEmployees([...employees, newUser]);
                setTempUser(newUser);
                
                await saveEmployeeToSupabase(newUser);
                setStep('confirm');
            };

            const confirmUser = () => {
                setUser(tempUser);
                setStep('intro');
            };

            const startQuiz = () => {
                setStep('quiz');
                setTimer(0);
                setInteractiveAns1('');
                setInteractiveAns2('');
            };

            const handleABAnswer = (option) => {
                clearInterval(intervalId);
                setSelectedOpt(option);
                processAnswerResult(option.isCorrect);
            };

            const handleInteractiveAnswer = (ans1, ans2) => {
                clearInterval(intervalId);
                const q = questions[currentIndex];
                let isCorrect = q.options2 ? (ans1 === q.correct1 && ans2 === q.correct2) : (ans1 === q.correct1);
                processAnswerResult(isCorrect);
            };

            const processAnswerResult = (isCorrect) => {
                if (isCorrect) setScore(s => s + 1);
                setLogs([...logs, {
                    questionId: questions[currentIndex].id,
                    topic: questions[currentIndex].topic,
                    timeSpent: timer,
                    isCorrect: isCorrect,
                }]);
                setShowFeedback(true);
            };

            const nextQuestion = async () => {
                setShowFeedback(false);
                setSelectedOpt(null);
                setInteractiveAns1('');
                setInteractiveAns2('');
                setTimer(0);
                
                if (currentIndex + 1 < questions.length) {
                    setCurrentIndex(currentIndex + 1);
                } else {
                    const totalTime = logs.reduce((acc, log) => acc + log.timeSpent, 0) + timer;
                    const finalScore = score + (logs[logs.length-1]?.isCorrect ? 1 : 0);
                    
                    await saveResultToSupabase({
                        emp_id: user.id,
                        name: user.name,
                        zone: user.zone,
                        score: finalScore,
                        time_spent: totalTime,
                        attempt: attemptCount,
                        is_passed: finalScore === 25
                    });
                    
                    setStep('result');
                }
            };

            const handleRetryClick = () => {
                setShowRetryConfirm(true);
            };

            const confirmRetry = () => {
                initQuestions();
                setCurrentIndex(0);
                setScore(0);
                setLogs([]);
                setAttemptCount(c => c + 1);
                setInteractiveAns1('');
                setInteractiveAns2('');
                setShowRetryConfirm(false);
                setStep('quiz');
            };

            const handleIssueCertificate = () => {
                setIsSendingEmail(true);
                setTimeout(() => {
                    setIsSendingEmail(false);
                    setStep('certificate');
                }, 3000);
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m > 0 ? `${m}m ` : ''}${s}s`;
            };

            const isPassed = score === questions.length;

            if (step === 'login') {

                                <div className={`pt-12 pb-10 px-6 rounded-b-[40px] shadow-lg relative overflow-hidden shrink-0 text-center text-white ${isPassed ? 'bg-accentGreen' : 'bg-danger'}`}>
                                    <div className="absolute top-0 right-0 w-48 h-48 bg-white opacity-20 rounded-full blur-2xl transform translate-x-1/3 -translate-y-1/4"></div>
                                    <div className="w-20 h-20 bg-white/20 backdrop-blur-md rounded-[24px] flex items-center justify-center mx-auto mb-4 border border-white/30 shadow-inner">
                                        {isPassed ? <Icons.Award className="w-10 h-10" /> : <Icons.XCircle className="w-10 h-10" />}
                                    </div>
                                    <h1 className="text-2xl font-black mb-1">{isPassed ? 'Passed!' : 'Failed!'}</h1>
                                    <p className="text-white/80 text-[10px] font-bold uppercase tracking-widest">{isPassed ? 'Congratulations' : 'Must score 100%'}</p>
                                </div>
                                
                                <div className="flex-1 px-6 pt-8 pb-10 flex flex-col">
                                    <div className="grid grid-cols-3 gap-3 mb-8">
                                        <div className="bg-card p-4 rounded-[20px] shadow-soft-3d border border-slate-100 text-center">
                                            <div className="text-textMuted text-[9px] font-black uppercase tracking-widest mb-1.5">Score</div>
                                            <div className="text-xl font-black text-textMain">{score}<span className="text-xs text-slate-400">/25</span></div>
                                        </div>
                                        <div className="bg-card p-4 rounded-[20px] shadow-soft-3d border border-slate-100 text-center">
                                            <div className="text-textMuted text-[9px] font-black uppercase tracking-widest mb-1.5">Time</div>
                                            <div className="text-xl font-black text-textMain">{formatTime(totalTime)}</div>
                                        </div>
                                        <div className="bg-card p-4 rounded-[20px] shadow-soft-3d border border-slate-100 text-center">
                                            <div className="text-textMuted text-[9px] font-black uppercase tracking-widest mb-1.5">Attempt</div>
                                            <div className="text-xl font-black text-textMain">#{attemptCount}</div>
                                        </div>
                                    </div>

                                    {!isPassed && (
                                        <div className="bg-card border border-red-100 p-5 rounded-[24px] mb-8 shadow-sm">
                                            <h3 className="font-black text-danger mb-4 text-sm flex items-center"><Icons.AlertTriangle className="w-4 h-4 mr-2"/> ข้อที่ท่านพลาดไป</h3>
                                            <ul className="space-y-3">
                                                {logs.filter(l => !l.isCorrect).map((log, i) => {
                                                    const q = questions.find(q => q.id === log.questionId);
                                                    return (
                                                        <li key={i} className="text-[11px] font-bold flex items-start bg-red-50 p-3 rounded-xl border border-red-100/50">
                                                            <div className="bg-white p-1 rounded shadow-sm mr-2 shrink-0 mt-0.5"><Icons.XCircle className="w-3 h-3 text-danger" /></div>
                                                            <div>
                                                                <span className="text-textMain mb-1.5 block">{q.topic}</span>
                                                                <span className="text-danger leading-relaxed">{q.explanation}</span>
                                                            </div>
                                                        </li>
                                                    );
                                                })}
                                            </ul>
                                        </div>
                                    )}

                                    <div className="mt-auto">
                                        {isPassed ? (
                                            <button onClick={handleIssueCertificate} className="w-full bg-textMain text-white text-sm font-black py-4 rounded-2xl shadow-lg transition-transform hover:scale-[1.02] flex justify-center items-center btn-modern">
                                                <Icons.Mail className="w-5 h-5 mr-2" /> ออกใบประกาศนียบัตร
                                            </button>
                                        ) : (
                                            <button onClick={handleRetryClick} className="w-full bg-primary text-white text-sm font-black py-4 rounded-2xl shadow-btn-primary transition-transform hover:scale-[1.02] flex justify-center items-center btn-modern">
                                                <Icons.RotateCcw className="w-5 h-5 mr-2" /> เริ่มทำแบบทดสอบใหม่อีกครั้ง
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            if (step === 'certificate') {
                return (
                    <div className="app-container bg-surface overflow-y-auto p-6 flex flex-col font-sans relative print:p-0 print:bg-white print:w-full print:max-w-none print:h-auto print:block">
                        <div className="flex-1 bg-card rounded-[32px] p-2 shadow-soft-3d border border-slate-100 mb-6 print:shadow-none print:border-none print:mb-0 print:rounded-none">
                            <div className="border-[10px] border-textMain rounded-[24px] p-2 h-full print:border-8">
                                <div className="border-2 border-primary rounded-[16px] p-6 text-center h-full relative overflow-hidden bg-white flex flex-col justify-center">
                                    <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-blue-50 rounded-full blur-3xl opacity-50 pointer-events-none"></div>
                                    <Icons.ShieldCheck className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-64 h-64 text-slate-50 opacity-40 pointer-events-none" />
                                    
                                    <div className="relative z-10">
                                        <h1 className="text-3xl font-black text-textMain uppercase tracking-widest mb-2 font-serif">Certificate</h1>
                                        <h2 className="text-[10px] text-primary font-black tracking-[0.2em] uppercase mb-8">of Achievement</h2>
                                        
                                        <p className="text-textMuted italic text-xs font-bold mb-4">This is to certify that</p>
                                        <div className="text-lg font-black text-textMain border-b-2 border-slate-200 inline-block pb-2 px-6 mb-6 line-clamp-1 w-full max-w-[250px]">
                                            {user.name}
                                        </div>
                                        
                                        <p className="text-textMain text-[11px] font-bold px-2 leading-relaxed mb-10">
                                            Has successfully completed the<br/>Knowledge Verification Test for the<br/>
                                            <strong className="text-[13px] block mt-1.5 text-primary">US Multi-Asset Index Principal Protection</strong><br/>
                                            achieving a perfect score of 100% on Attempt #{attemptCount}.
                                        </p>
                                        
                                        <div className="flex justify-between items-end mt-auto px-2">
                                            <div className="text-center w-1/3">
                                                <div className="text-textMuted font-mono text-[9px] font-bold mb-1 truncate">{user.id}</div>
                                                <div className="border-t border-textMain pt-1 text-textMain font-black uppercase tracking-wider text-[7px]">Emp ID</div>
                                            </div>
                                            <div className="text-center w-1/3 px-2">
                                                <div className="w-12 h-12 bg-orange-50 rounded-full flex items-center justify-center mx-auto mb-2 border border-orange-100"><Icons.Award className="w-6 h-6 text-accentOrange" /></div>
                                                <div className="text-textMain font-black tracking-widest text-[8px]">PRUDENTIAL</div>
                                            </div>
                                            <div className="text-center w-1/3">
                                                <div className="text-textMain font-black text-[10px] mb-1 truncate">{user.zone}</div>
                                                <div className="border-t border-textMain pt-1 text-textMain font-black uppercase tracking-wider text-[7px]">Zone (RH)</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button onClick={() => window.print()} className="mt-auto bg-white border border-slate-200 text-textMain py-4 rounded-2xl font-black shadow-soft-3d flex items-center justify-center btn-modern print:hidden text-sm w-full shrink-0">
                            <Icons.Download className="w-5 h-5 mr-2 text-primary" /> บันทึก Certificate เป็น PDF
                        </button>
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
